<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#4a3120"/><stop offset="1" stop-color="#241910"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2a1f17"/><stop offset="1" stop-color="#0d0907"/>
    </radialGradient>
    <radialGradient id="lab" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f0c463"/><stop offset="1" stop-color="#c2872c"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- vinyl record -->
  <circle cx="256" cy="244" r="170" fill="url(#vinyl)"/>
  <g fill="none" stroke="#3a2c20" stroke-width="3" opacity=".7">
    <circle cx="256" cy="244" r="150"/><circle cx="256" cy="244" r="128"/>
    <circle cx="256" cy="244" r="106"/><circle cx="256" cy="244" r="84"/>
  </g>
  <circle cx="256" cy="244" r="56" fill="url(#lab)"/>
  <circle cx="256" cy="244" r="9" fill="#241910"/>
  <!-- shelf ledge -->
  <rect x="64" y="418" width="384" height="26" rx="6" fill="#6b4a2e"/>
  <rect x="64" y="436" width="384" height="14" rx="4" fill="#3f2a16"/>
  <!-- gold H mark -->
  <text x="256" y="270" font-family="Georgia, serif" font-size="62" font-weight="700"
        fill="#241910" text-anchor="middle">H</text>
</svg>
